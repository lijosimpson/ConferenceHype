name: YouTube stream

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Maximum stream duration before GitHub stops the job"
        required: true
        default: "5"
        type: choice
        options:
          - "5"
          - "15"
          - "30"
          - "60"
          - "180"
      stream_input_path:
        description: "Video file to loop into YouTube"
        required: true
        default: "public/rendered/fallback-loop.mp4"
  schedule:
    # 8:00 AM EDT on May 24. Remove after the 2026 test run if not needed again.
    - cron: "0 12 24 5 *"

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event_name == 'schedule' && '180' || inputs.duration_minutes) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Start YouTube RTMP loop
        run: npm run job:stream
        env:
          YOUTUBE_RTMP_URL: ${{ secrets.YOUTUBE_RTMP_URL }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          STREAM_INPUT_PATH: ${{ github.event_name == 'schedule' && 'public/rendered/fallback-loop.mp4' || inputs.stream_input_path }}
          STREAM_DURATION_SECONDS: ${{ github.event_name == 'schedule' && '10800' || '' }}
